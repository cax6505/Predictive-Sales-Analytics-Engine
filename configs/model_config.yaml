# ─────────────────────────────────────────────
# Predictive Sales Analytics Engine
# Model Configuration
# ─────────────────────────────────────────────

project:
  name: predictive-sales-analytics-engine
  version: "1.0.0"
  seed: 42

paths:
  data_raw: data/raw
  data_processed: data/processed
  outputs: outputs
  models: models

data:
  target_column: high_value_order
  test_size: 0.15
  val_size: 0.15
  stratify: true

baseline_models:
  logistic_regression:
    max_iter: 1000
    C: 1.0
    solver: lbfgs
  random_forest:
    n_estimators: 300
    max_depth: 12
    min_samples_leaf: 5
    n_jobs: -1
  xgboost:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8

deep_learning:
  hidden_dims: [256, 128, 64]
  dropout: 0.3
  learning_rate: 0.001
  batch_size: 512
  epochs: 50
  patience: 10
  weight_decay: 1.0e-4
  optimizer: adam
  scheduler: cosine_annealing

hybrid_model:
  gate_hidden_dim: 64
  ml_weight: 0.4
  dl_weight: 0.6

evaluation:
  primary_metric: roc_auc
  threshold: 0.5
  k_folds: 5
